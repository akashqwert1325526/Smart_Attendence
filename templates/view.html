<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<div class="container">
{% if status == "success" %}
    <span class="status-chip status-chip-present">Present</span>
    <div class="success-checkmark">&#10004;</div>
    <h2 class="status-text-present">{{ message }}</h2>
{% else %}
    <span class="status-chip status-chip-absent">Absent</span>
    <h2 class="status-text-absent">{{ message }}</h2>
{% endif %}
<br>
<a href="/" class="btn">Back</a>
</div>
